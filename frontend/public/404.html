<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | NyayaVanni</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; max-width: 480px; padding: 2rem; }
    h1 { font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, #2563eb, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h2 { font-size: 1.5rem; margin-top: 0.5rem; color: #f1f5f9; }
    p { margin-top: 1rem; color: #94a3b8; line-height: 1.6; }
    a {
      display: inline-block; margin-top: 2rem; padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #2563eb, #6366f1); color: #fff;
      border-radius: 9999px; text-decoration: none; font-weight: 600;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist, has been moved, or the URL may be incorrect.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
